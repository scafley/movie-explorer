<div class="w-full flex mt-3 flex-col">
  <input
    type="search"
    [formControl]="searchControl"
    placeholder="Wpisz tytuł"
    class="border rounded px-3 py-2 max-w-xl"
  />

  <select [formControl]="genreControl">
    <option [ngValue]="null">Wszystkie gatunki</option>
    @for (genre of (store.genres$ | async) ?? []; track genre.id) {
      <option [ngValue]="genre.id">{{ genre.name }}</option>
    }
  </select>

  <div class="w-full">
    @if (store.loading$ | async) {
      <p>Ładowanie...</p>
    } @else if (store.error$ | async; as err) {
      <p>{{ err }}</p>
    } @else {
      <app-movie-list [movies]="(store.movies$ | async) ?? []" />
      @if (store.hasMore$ | async) {
        <button (click)="store.loadMore()">Załaduj więcej</button>
      }
    }
  </div>
</div>
