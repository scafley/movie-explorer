<div class="w-full flex mt-3 flex-col">
  <input
    type="search"
    [formControl]="searchControl"
    placeholder="Wpisz tytuł"
    class="border rounded px-3 py-2 w-xl"
  />

  <div class="w-full">
    @let movies = (movies$ | async) ?? [];
    <app-movie-list [movies]="movies" />
  </div>
</div>
